name: Build Debug APK

on:
  push:
    branches: [master]
    paths-ignore:
    - '.github/**'
    - 'utils/**'
    - '.*'
    - '*.md'
  workflow_dispatch:


permissions:
  contents: read


concurrency:
  group: build-debug-apk-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 21
        distribution: temurin

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: Restore stable debug keystore
      run: |
        if [ -z "${DEBUG_KEYSTORE_BASE64}" ]; then
          echo "ERROR: DEBUG_KEYSTORE_BASE64 is required."
          exit 1
        fi
        mkdir -p "${HOME}/.android"
        echo "${DEBUG_KEYSTORE_BASE64}" | base64 --decode > "${HOME}/.android/debug.keystore"
        keytool -list -keystore "${HOME}/.android/debug.keystore" -storepass android
        echo "DEBUG_KEYSTORE_PATH=${HOME}/.android/debug.keystore" >> "$GITHUB_ENV"
      env:
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}

    - name: Run checks and build debug APK
      run: ./gradlew --no-daemon check assembleDebug

    - name: Generate lint summary
      if: always()
      run: bash .github/scripts/generate-lint-summary.sh

    - name: Rename debug APK
      run: |
        mv org.fox.ttrss/build/outputs/apk/debug/org.fox.ttrss-debug.apk \
          "org.fox.ttrss/build/outputs/apk/debug/org.fox.ttrss-debug-${{ github.run_number }}-${{ github.sha }}.apk"

    - name: Upload debug APK
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        path: org.fox.ttrss/build/outputs/apk/debug/org.fox.ttrss-debug-${{ github.run_number }}-${{ github.sha }}.apk
        archive: false

    - name: Upload full reports
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-reports-${{ github.run_number }}
        path: |
          org.fox.ttrss/build/reports/lint-results-debug.html
          org.fox.ttrss/build/reports/problems/problems-report.html
        if-no-files-found: ignore
