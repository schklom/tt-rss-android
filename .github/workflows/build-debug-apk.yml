name: Build Debug APK

on:
  push:
    branches: [master]
    paths-ignore:
    - '.github/**'
    - 'utils/**'
    - '.*'
    - '*.md'
  workflow_dispatch:


permissions:
  contents: read


concurrency:
  group: build-debug-apk-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: temurin

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Restore stable debug keystore
      run: |
        if [ -z "${DEBUG_KEYSTORE_BASE64}" ]; then
          echo "ERROR: DEBUG_KEYSTORE_BASE64 is required."
          exit 1
        fi
        mkdir -p "${HOME}/.android"
        echo "${DEBUG_KEYSTORE_BASE64}" | base64 --decode > "${HOME}/.android/debug.keystore"
        keytool -list -keystore "${HOME}/.android/debug.keystore" -storepass android
        echo "DEBUG_KEYSTORE_PATH=${HOME}/.android/debug.keystore" >> "$GITHUB_ENV"
      env:
        DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}

    - name: Run checks and build debug APK
      run: ./gradlew --no-daemon check assembleDebug

    - name: Generate lint summary
      if: always()
      run: bash .github/scripts/generate-lint-summary.sh

    - name: Upload debug APK
      uses: actions/upload-artifact@v7
      with:
        name: org.fox.ttrss-debug-${{ github.run_number }}-${{ github.sha }}
        path: org.fox.ttrss/build/outputs/apk/debug/org.fox.ttrss-debug.apk

    - name: Upload full reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: build-reports-${{ github.run_number }}
        path: |
          org.fox.ttrss/build/reports/lint-results-debug.html
          org.fox.ttrss/build/reports/problems/problems-report.html
        if-no-files-found: ignore
